<?xml version="1.0" encoding="UTF-8"?>
<svg width="700" height="400" viewBox="0 0 700 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="400" fill="#f7fbff"/>
  <!-- User -->
  <rect x="40" y="170" width="100" height="60" rx="12" fill="#1976d2"/>
  <text x="90" y="205" text-anchor="middle" fill="#fff" font-size="18" font-family="Segoe UI">User</text>
  <!-- Arrow to Frontend -->
  <line x1="140" y1="200" x2="220" y2="200" stroke="#1976d2" stroke-width="3" marker-end="url(#arrow)"/>
  <!-- Frontend -->
  <rect x="220" y="120" width="160" height="160" rx="18" fill="#42a5f5"/>
  <text x="300" y="170" text-anchor="middle" fill="#fff" font-size="16" font-family="Segoe UI">Frontend</text>
  <text x="300" y="195" text-anchor="middle" fill="#fff" font-size="13" font-family="Segoe UI">React SPA</text>
  <text x="300" y="220" text-anchor="middle" fill="#fff" font-size="13" font-family="Segoe UI">Vite, Unified UI</text>
  <!-- Arrow to Backend -->
  <line x1="380" y1="200" x2="470" y2="200" stroke="#1976d2" stroke-width="3" marker-end="url(#arrow)"/>
  <!-- Backend -->
  <rect x="470" y="100" width="170" height="200" rx="18" fill="#1565c0"/>
  <text x="555" y="150" text-anchor="middle" fill="#fff" font-size="16" font-family="Segoe UI">Backend</text>
  <text x="555" y="175" text-anchor="middle" fill="#fff" font-size="13" font-family="Segoe UI">Node.js/Express</text>
  <text x="555" y="200" text-anchor="middle" fill="#fff" font-size="13" font-family="Segoe UI">REST API, Logging</text>
  <text x="555" y="225" text-anchor="middle" fill="#fff" font-size="13" font-family="Segoe UI">Validation, Health</text>
  <!-- Arrow to DB -->
  <line x1="555" y1="300" x2="555" y2="350" stroke="#1976d2" stroke-width="3" marker-end="url(#arrow)"/>
  <!-- Database -->
  <ellipse cx="555" cy="370" rx="60" ry="20" fill="#90caf9"/>
  <text x="555" y="375" text-anchor="middle" fill="#1565c0" font-size="15" font-family="Segoe UI">PostgreSQL DB</text>
  <!-- Supporting: Logging -->
  <rect x="220" y="20" width="160" height="40" rx="10" fill="#b3d1f7"/>
  <text x="300" y="47" text-anchor="middle" fill="#1976d2" font-size="13" font-family="Segoe UI">Logging & Health</text>
  <line x1="300" y1="60" x2="300" y2="120" stroke="#1976d2" stroke-width="2" stroke-dasharray="4 2"/>
  <!-- Supporting: Uploads -->
  <rect x="470" y="20" width="170" height="40" rx="10" fill="#b3d1f7"/>
  <text x="555" y="47" text-anchor="middle" fill="#1976d2" font-size="13" font-family="Segoe UI">Uploads: Profile Pics</text>
  <line x1="555" y1="60" x2="555" y2="100" stroke="#1976d2" stroke-width="2" stroke-dasharray="4 2"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 L2,5 Z" fill="#1976d2" />
    </marker>
  </defs>
</svg>
